<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Login Project</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex justify-center items-center min-h-screen bg-slate-400">

    <!-- 🔐 Login Section -->
    <div id="loginSection" class="bg-white p-6 rounded shadow w-80">
        <h1 class="text-2xl font-bold text-center mb-4">Login</h1>

        <input id="username" type="text" placeholder="Username" class="input input-bordered w-full mb-3" />

        <input id="password" type="password" placeholder="Password" class="input input-bordered w-full mb-4" />

        <button id="loginBtn" class="btn btn-primary w-full">Login</button>

        <p id="errorMsg" class="text-red-500 text-center mt-2 hidden">
            ❌ Username or Password incorrect
        </p>
    </div>

    <!-- 🎉 Welcome Section -->
    <div id="welcomeSection" class="hidden bg-white p-6 rounded shadow w-80 text-center">
        <div class="card bg-base-100 w-96 shadow-sm">
            <figure>
                <img src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp" alt="Shoes" />
            </figure>
            <div class="card-body">
                <h2 class="card-title">Card Title</h2>
                <p>A card component has a figure, a body part, and inside body there are title and actions parts</p>
                <div class="card-actions justify-end">
                    <button class="btn btn-primary">Buy Now</button>
                </div>
            </div>
        </div>

        <button id="logoutBtn" class="btn btn-error">Logout</button>
    </div>

    <script>
        const loginBtn = document.getElementById("loginBtn");
        const loginSection = document.getElementById("loginSection");
        const welcomeSection = document.getElementById("welcomeSection");
        const errorMsg = document.getElementById("errorMsg");
        const welcomeText = document.getElementById("welcomeText");

        loginBtn.addEventListener("click", () => {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            // ✅ Check credentials
            if (username === "admin" && password === "admin123") {

                // Hide login
                loginSection.classList.add("hidden");

                // Show welcome
                welcomeSection.classList.remove("hidden");

                // Show username
                welcomeText.innerHTML = `Hello <span class="font-bold">${username}</span> 👋`;

                errorMsg.classList.add("hidden");

            } else {
                // ❌ Show error
                errorMsg.classList.remove("hidden");
            }
        });

        // 🔁 Logout
        document.getElementById("logoutBtn").addEventListener("click", () => {
            welcomeSection.classList.add("hidden");
            loginSection.classList.remove("hidden");
        });
    </script>

</body>

</html>
