<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>github-issuse-tracker</title>


    <!-- daisyuI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />


    <!-- css file -->
    <link rel="stylesheet" href="style.css">

    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>



</head>

<body class="min-h-screen ">

    <div id="mainDiv" class="container flex justify-center items-center min-h-screen  bg-slate-400">
        <div class="title">

        </div>
        <div id="loginForm" class="login-form m-auto ">
            <div class="logo">
                <img src="./assets/github-logo.png" alt="" class="mx-auto w-20">
                <h1 class="mt-3 text-3xl font-bold">GitHub Issuses Tracker</h1>
                <p class="text-center pb-3">Sign in to manage your issues</p>
            </div>

            <fieldset id="loginDiv" class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 logindiv">


                <label class="label font-bold">Username</label>
                <input id="username" type="text" class="input" placeholder="Enter Username" autocomplete="off" />

                <label class="label text-green-500">Default : admin</label>

                <label class="label">Password</label>
                <input id="password" type="password" class="input" placeholder="Password" />
                <label class="label text-green-500">Default : admin123</label>

                <button id="loginBtn" class="btn btn-neutral mt-4">Login</button>

                <h5 class="text-center font-bold mt-4">OR</h5>

                <p class="text-center ">Demo Credentials: </p>
                <div class="demo mt-2 rounded bg-slate-400">
                    <h5 class="mt-3 text-center">
                        <span class="font-bold">Username : </span> admin
                    </h5>

                    <h5 class="text-center pb-3"><span class="font-bold ">Password :</span> admin123</h5>
                </div>
            </fieldset>
        </div>
    </div>

    <section class="p-5">


    </section>




    <section id="todoSection" class="hidden">
        <div class="sticky top-0 left-0 right-0 z-50 bg-white shadow">

            <header class=" p-4 justify-start gap-2"><button
                    class="btn ml-2 w-[100px] hover:to-blue-600 mx-auto ">All</button><button id="openCountBtn"
                    class="btn ml-2 w-[100px]">Open</button><button class="btn ml-2 w-[100px]">Closed</button>
            </header>


            <div class="total flex justify-between p-4 border-1 border-black-300 rounded left-0 w-full">
                <div class="flex gap-3">
                    <div><img class="mt-4" src="./assets/Aperture.png" alt=""></div>
                    <div>
                        <h3 class="text-2xl font-bold">50 Issues</h3>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 mt-5 ">
                    <p class="flex"><img class="w-6 h-6 mr-2" src="./assets/Open-Status.png" alt="">open</p>
                    <p class="flex"><img class="w-6 h-6 mr-2" src="./assets/Closed- Status .png" alt="">Closed</p>
                </div>

            </div>

        </div>

        <div id="todosContainer"
            class="containerCard grid grid-cols-1 min-[600px]:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">


        </div>

    </section>


    <section>


        <dialog id="my_modal_4" class="modal">
            <div id="modalContainer" class="modal-box">
                <div id="modalContent"></div>

                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </section>




    <script src="./script.js"></script>
</body>

</html>
